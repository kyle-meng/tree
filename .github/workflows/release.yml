name: Release-Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (Static link via MUSL)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: ""
          # Windows x86_64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            suffix: ".exe"
          # ARM64 (Modern Routers/Raspberry Pi 4/5)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: ""
          # ARMv7 (Older Routers/Raspberry Pi 3)
          - target: armv7-unknown-linux-muslhf
            os: ubuntu-latest
            suffix: ""
          # macOS (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""

    steps:
      - name: Checkout-Code
        uses: actions/checkout@v4

      - name: Install-Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build-With-Cross
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release"
          strip: true

      - name: Prepare-Artifacts
        run: |
          # Replace 'your_app' with the 'name' field in your Cargo.toml
          BIN_NAME="your_app" 
          mkdir -p output
          cp target/${{ matrix.target }}/release/$BIN_NAME${{ matrix.suffix }} output/$BIN_NAME-${{ matrix.target }}${{ matrix.suffix }}

      - name: Compress-With-UPX
        if: matrix.os == 'ubuntu-latest'
        uses: svenstaro/upx-action@v2
        with:
          files: output/*
          args: --best

      - name: Upload-Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: output/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download-Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-binaries
          merge-multiple: true

      - name: Create-Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
